<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phone Verification</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.8s ease-out;
    }

    h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input[type="tel"] {
      padding: 12px;
      margin: 10px 0 20px;
      width: 100%;
      border-radius: 10px;
      border: 2px solid #334155;
      background-color: #0f172a;
      color: #f1f5f9;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="tel"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 8px #38bdf8;
      animation: pulse 1s infinite alternate;
    }

    .otp-section {
      margin-top: 20px;
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease-in-out;
    }

    .otp-section.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
      animation: slideUp 0.6s ease-out;
    }

    .otp-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .otp-input {
      width: 48px;
      height: 55px;
      font-size: 22px;
      text-align: center;
      border-radius: 10px;
      border: 2px solid #334155;
      background-color: #0f172a;
      color: #f1f5f9;
      transition: border 0.2s;
    }

    .otp-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 10px #38bdf8;
      animation: pulse 1s infinite alternate;
      outline: none;
    }

    button {
      background: #38bdf8;
      border: none;
      color: #0f172a;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.05);
      animation: bounce 0.4s;
    }

    /* Animations */
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 8px #38bdf8; }
      100% { box-shadow: 0 0 16px #38bdf8; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Phone Verification</h2>

    <!-- Phone Number Input -->
    <input type="tel" id="phone-number" placeholder="Enter your phone number" maxlength="15"/>
    <br>
    <button onclick="showOtp()">Send OTP</button>

    <!-- OTP Input Section -->
    <div class="otp-section" id="otp-section">
      <div class="otp-container">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 0)">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 1)">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 2)">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 3)">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 4)">
        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 5)">
      </div>
      <button onclick="submitOtp()">Verify OTP</button>
    </div>
  </div>

  <script>
    function showOtp() {
      const phoneInput = document.getElementById('phone-number');
      if (phoneInput.value.trim() === "") {
        alert("Please enter your phone number.");
        return;
      }
      const otpSection = document.getElementById('otp-section');
      otpSection.classList.add("active");
      setTimeout(() => {
        document.querySelectorAll('.otp-input')[0].focus();
      }, 300);
    }

    function moveToNext(el, index) {
      const inputs = document.querySelectorAll('.otp-input');
      if (el.value.length > 0 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    }

    function submitOtp() {
      const otp = Array.from(document.querySelectorAll('.otp-input')).map(input => input.value).join('');
      if (otp.length < 6) {
        alert("Please enter all 6 digits of the OTP.");
        return;
      }
      alert("OTP Submitted: " + otp);
    }
  </script>

</body>
</html>
