<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 50px 20px;
      color: #fff;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 40px;
      color: #fce38a;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    section{
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 15px 0;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
    }

    .label {
      font-weight: 500;
      font-size: 15px;
    }

    .value {
      font-size: 15px;
      text-align: right;
      color: #eee;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn-approve {
      background: linear-gradient(135deg, #00f2fe, #4facfe);
      box-shadow: 0 0 15px #00f2fe;
    }

    .btn-reject {
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      box-shadow: 0 0 15px #ff4b2b;
    }

    .btn:hover { transform: scale(1.03); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-content h3 {
      margin-bottom: 15px;
      font-size: 18px;
      text-align: center;
    }

    .modal-content textarea {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      resize: none;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      outline: none;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 15px;
    }

    .modal-actions button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn-cancel {
      background: #555;
      color: white;
    }

    .btn-cancel:hover {
      background: #777;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      color: white;
      box-shadow: 0 0 10px #ff4b2b;
    }

    .btn-confirm:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h2>Member Status Panel</h2>
<section>
    {% if pending_requests %}
        {% for i in pending_requests%}
        
            <div class="glass-card">
                <div class="info-row">
                <div class="label">Username</div>
                <div class="value">{{ i.user.username }}</div>
                </div>

                <div class="info-row">
                <div class="label">Duty</div>
                <div class="value">{{ i.user.memberregistration.duty }}</div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-approve" id="approve" data-userid="{{i.user.id}}">✅ Approve</button>
                    <button type="button" onclick="openModal()" class="btn btn-reject">❌ Reject</button>
                </div>
            </div>


            <!-- Modal -->
            <div class="modal" id="rejectModal">
                <div class="modal-content">
                    <h3>Reason for Rejection</h3>
                    <div>
                        <textarea id="reason" placeholder="Enter reason..." required></textarea>
                        <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                        <button type="button" class="btn-confirm" id="reject" data-id="{{i.user.id}}">Reject</button>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="glass-card">
            <h2>No pending requests</h2>
        </div>
    {% endif %}
</section>

  <script type="module">
    import {showAlert} from "{% static 'scripts/alert.js' %}"


    const approve=document.getElementById("approve");
    const reject=document.getElementById("reject");

    

    approve.addEventListener("click",()=>{
        let userid=approve.dataset.userid;
        let url=`/convenier/request_response/approve/${userid}/`;
        try{
            fetch(url).then(res=>res.json()).then((data)=>{
                if (data.status=="success"){
                    showAlert(data.status,data.title,data.message,"/convenier/pending_requests/");
                }
                else{
                    showAlert(data.status,data.title,data.message,"ok");
                }
            })
        }
        catch(error){
            showAlert("error","An error occured",error.message,"ok");
        }
    });

    reject.addEventListener("click",()=>{
        const reason=document.getElementById("reason").value.trim();

        console.log(reason)
        if (reason.length==0){
            return showAlert("error","Invalid reason","Reason connaot be blank","ok")
        }
        let url=`/convenier/request_response/reject/${reject.dataset.id}/?reason=${encodeURIComponent(reason)}`;
        try{
            fetch(url).then(res=>res.json()).then((data)=>{
                if (data.status=="success"){
                    showAlert(data.status,data.title,data.message,"/convenier/pending_requests/");
                }
                else{
                    showAlert(data.status,data.title,data.message,"ok");
                }
            })
        }
        catch(error){
            showAlert("error","An error occured",error.message,"ok");
        }

    })


    function openModal() {
      document.getElementById("rejectModal").style.display = "flex";
    }
    function closeModal() {
      document.getElementById("rejectModal").style.display = "none";
    }

    window.openModal=openModal;
    window.closeModal=closeModal;


  </script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

</body>
</html>
