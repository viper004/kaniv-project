<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Edit Academic Details</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            color: #333;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-submit {
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }
        select{
            cursor: pointer;
        }

        .loader {
    display: none;
  width: 60px;
  height: 60px;
  margin: auto;
  position: absolute;
  top: 50%;
  left: 50%;
  z-index: 100;
}

.loader:before {
  content: '';
  width: 60px;
  height: 5px;
  background: #f0808050;
  position: absolute;
  top: 60px;
  left: 0;
  border-radius: 50%;
  animation: shadow324 0.5s linear infinite;
}

.loader:after {
  content: '';
  width: 100%;
  height: 100%;
  background: #f08080;
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 4px;
  animation: jump7456 0.5s linear infinite;
}

@keyframes jump7456 {
  15% {
    border-bottom-right-radius: 3px;
  }

  25% {
    transform: translateY(9px) rotate(22.5deg);
  }

  50% {
    transform: translateY(18px) scale(1, .9) rotate(45deg);
    border-bottom-right-radius: 40px;
  }

  75% {
    transform: translateY(9px) rotate(67.5deg);
  }

  100% {
    transform: translateY(0) rotate(90deg);
  }
}

@keyframes shadow324 {

  0%,
    100% {
    transform: scale(1, 1);
  }

  50% {
    transform: scale(1.2, 1);
  }
}
    </style>
</head>
<body>
<div class="container">

    <h2>Edit Academic Details</h2>
    <form action="{% url 'users:academic_edit' %}" method="post" id="form">
        {% csrf_token %}


        <div class="form-group">
            <label for="adno">Admission Number</label>
            <input type="text" name="adno" id="adno" value="{{request.user.memberregistration.adno}}" required>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <select name="department" id="department" required>
                <option value="">Select Department</option>
                <option value="bba">BBA</option>
                <option value="bca">BCA</option>
                <option value="bsc_cs">BSC CS</option>
                <option value="bcom_tax">BCOM Tax</option>
                <option value="ttm">TTM</option>
                <option value="bcom_ca_and_finance">BCOM CA and Finance</option>
                <option value="bcom_co_operation">BCOM Co-operation</option>
                <option value="ba_literature">BA Literature</option>
                <option value="ba_communicative_english">BA Communicative English</option>
                <option value="ba_journalism">BA Journalism</option>
                <option value="electronics">Electronics</option>
                <option value="bsw">BSW</option>
            </select>
        </div>

        <div class="form-group">
            <label for="start_year">Start Year</label>
            <input type="text" name="start_year" maxlength="4" id="start_year" value="{{request.user.memberregistration.start_year}}" placeholder="e.g., 2022" inputmode="numeric" required>
        </div>

        <div class="form-group">
            <label for="end_year">End Year</label>
            <input type="text" name="end_year" maxlength="4" id="end_year" value="{{request.user.memberregistration.end_year}}" placeholder="e.g., 2025" inputmode="numeric" required>
        </div>

        <button type="submit" class="btn-submit">Update</button>
    </form>
</div>
<div class="loader" id="loader"></div>
</body>
<script type="module">
    import {showAlert} from "{% static 'scripts/alert.js' %}"
    const department=document.getElementById("department");
    const form=document.getElementById("form");
    const loader=document.getElementById("loader");
    const startYear=document.getElementById("start_year");
    const endYear=document.getElementById("end_year");

    const allowOnlyYearInput = (event) => {
        event.target.value = event.target.value.replace(/\D/g, "").slice(0, 4);
    };

    startYear.addEventListener("input", allowOnlyYearInput);
    endYear.addEventListener("input", allowOnlyYearInput);

    window.addEventListener("contextmenu",(e)=>{
        e.preventDefault();
        showAlert("error","Not allowed!","Context menu is not allowed","ok")
    })

    department.value="{{request.user.memberregistration.department}}";
    form.addEventListener("submit",(e)=>{
        e.preventDefault();
        loader.style.display="block";
        let formdata=new FormData(e.target);
        fetch(e.target.action,{
            "method":"POST",
            "body":formdata
        }).then(res=>res.json()).then((data)=>{
            console.log(data);
            if (data.status=="success"){
                showAlert(data.status,data.title,data.message,"/users/profile/");
            }
            else{
                showAlert(data.status,data.title,data.message,"ok");

            }
            loader.style.display="none";
        })
    })

</script>
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</html>
