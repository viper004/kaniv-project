<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .reset-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .card-header {
            background: #4a00e0;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .card-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .card-header p {
            opacity: 0.8;
            font-size: 14px;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 3px;
            background: #f0f0f0;
            z-index: 1;
        }
        
        .step {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: #4a00e0;
            color: white;
        }
        
        .step.completed {
            background: #00c851;
            color: white;
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            border-color: #4a00e0;
            outline: none;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            cursor: pointer;
        }
        
        .btn {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #3a00b0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .action-btn {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: #3a00b0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .resend-otp {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .resend-otp a {
            color: #4a00e0;
            text-decoration: none;
            font-weight: 500;
        }
        
        .resend-otp a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="card-header">
                <h2>Reset Your Password</h2>
                <p>Follow the steps to reset your password securely</p>
            </div>
            
            <div class="card-body">
                <div class="step-indicator">
                    <div class="step active">1</div>
                    <div class="step">2</div>
                    <div class="step">3</div>
                </div>
                
                <!-- Step 1: Username (not a form) -->
                <div class="form-step active" id="step1">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    <button type="button" class="action-btn" id="nextToOtp">Continue</button>
                </div>
                
                <!-- Step 2: OTP Verification (not a form) -->
                <div class="form-step" id="step2">
                    <div class="input-group">
                        <i class="fas fa-shield-alt"></i>
                        <input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>
                    </div>
                    <button type="button" class="action-btn" id="verifyOtp">Verify OTP</button>
                    <div class="resend-otp">
                        Didn't receive OTP? <a href="#" id="resendOtp">Resend OTP</a>
                    </div>
                </div>
                
                <!-- Step 3: New Password (actual form) -->
                <form action="{% url 'users:forgot_password' %}" method="post" class="form-step" id="step3">
                    {% csrf_token %}
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="new_password1" placeholder="Enter new password" required>
                        <span class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="new_password2" placeholder="Confirm new password" required>
                        <span class="password-toggle" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    
                    <button type="submit" class="btn">Reset Password</button>
                </form>
                
                <div class="message" id="message"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const steps = document.querySelectorAll('.step');
            const nextToOtpBtn = document.getElementById('nextToOtp');
            const verifyOtpBtn = document.getElementById('verifyOtp');
            const messageDiv = document.getElementById('message');
            const resendOtpLink = document.getElementById('resendOtp');
            const togglePassword = document.getElementById('togglePassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            
            // Move to OTP step
            nextToOtpBtn.addEventListener('click', function() {
                const username = document.getElementById('username').value;
                if (username.trim() === '') {
                    showMessage('Please enter your username', 'error');
                    return;
                }
                let url=`/users/forgot_password/?username=${username}&method=send_code`;

                showMessage('Loading...', 'error');


                fetch(url).then(res=>res.json()).then((data)=>{
                    console.log(data);
                    showMessage(`${data.title} - ${data.message} `,data.status);

                    if (data.status=="success"){
                        setTimeout(() => {
                            step1.classList.remove('active');
                            step2.classList.add('active');
                            steps[0].classList.remove('active');
                            steps[0].classList.add('completed');
                            steps[1].classList.add('active');
                            messageDiv.style.display = 'none';
                        }, 1000);
                    }
                })
            });
            
            // Verify OTP
            verifyOtpBtn.addEventListener('click', function() {
                const otp = document.getElementById('otp').value;
                if (otp.trim() === '' || otp.length !== 4) {
                    showMessage('Please enter a valid 6-digit OTP', 'error');
                    return;
                }
                let url=`/users/forgot_password/?entered_otp=${otp}&method=verify_code`
                showMessage('Loading...', 'error');

                fetch(url).then(res=>res.json()).then((data)=>{
                    console.log(data);
                    showMessage(`${data.title} - ${data.message} `,data.status);

                    if (data.status=="success"){
                        setTimeout(() => {
                            step2.classList.remove('active');
                            step3.classList.add('active');
                            steps[1].classList.remove('active');
                            steps[1].classList.add('completed');
                            steps[2].classList.add('active');
                            messageDiv.style.display = 'none';
                        }, 1000);
                    }
                })
            });
            
            // Resend OTP
            resendOtpLink.addEventListener('click', function(e) {
                e.preventDefault();
                showMessage('New OTP has been sent to your registered email/phone', 'success');
                
                // Hide message after 3 seconds
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            });
            
            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            toggleConfirmPassword.addEventListener('click', function() {
                const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPasswordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
            
            // Form submission
            document.getElementById('step3').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
               
                
                if (password !== confirmPassword) {
                    showMessage('Passwords do not match', 'error');
                    return;
                }
                showMessage('Loading...', 'error');
                
                let formdata=new FormData(e.target)
                fetch(e.target.action,{
                    "method":"POST",
                    "body":formdata
                }).then(res=>res.json()).then((data)=>{
                    console.log(data);

                    showMessage(`${data.title} - ${data.message} redirect to login after 2 seconds `,data.status);
                    

                    if (data.status=="success"){
                        setTimeout(() => {
                            this.reset();
                            step3.classList.remove('active');
                            step1.classList.add('active');
                            steps[2].classList.remove('active');
                            steps[0].classList.remove('completed');
                            steps[1].classList.remove('completed');
                            steps[0].classList.add('active');
                            messageDiv.style.display = 'none';
                        }, 2000);
                    }

                })
                // Reset form after success
                
            });
            
            // Helper function to show messages
            function showMessage(text, type) {
                messageDiv.textContent = text;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
            }
            
            // Allow Enter key to submit forms
            document.getElementById('username').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    nextToOtpBtn.click();
                }
            });
            
            document.getElementById('otp').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    verifyOtpBtn.click();
                }
            });
        });
    </script>
</body>
</html>
