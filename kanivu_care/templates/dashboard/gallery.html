<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel Modal with Swiper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(50, 50, 93, 0.11);
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(50, 50, 93, 0.1);
        }

        .carousel_modal_overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .carousel_modal_overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .carousel_modal {
            background: white;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .carousel_modal_overlay.active .carousel_modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-weight: 600;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #e74c3c;
        }

        .carousel-container {
            position: relative;
            overflow: hidden;
            height: 450px;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .swiper-button-next,
        .swiper-button-prev {
            color: white;
            background: rgba(0, 0, 0, 0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .swiper-button-next:after,
        .swiper-button-prev:after {
            font-size: 20px;
            font-weight: bold;
        }

        .swiper-button-next:hover,
        .swiper-button-prev:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .swiper-pagination-bullet {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 1;
        }

        .swiper-pagination-bullet-active {
            background: white;
        }

        @media (max-width: 768px) {
            .carousel-container {
                height: 350px;
            }
        }

        @media (max-width: 576px) {
            .carousel-container {
                height: 250px;
            }
            
            .swiper-button-next,
            .swiper-button-prev {
                width: 30px;
                height: 30px;
            }
            
            .swiper-button-next:after,
            .swiper-button-prev:after {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Carousel Modal with Swiper</h1>
        <p>Click the button below to open a modal with a responsive image carousel powered by Swiper.js. Navigate through the images using the arrow buttons, pagination dots, or by swiping on touch devices.</p>
        <button class="btn" id="openModal">View Image Gallery</button>
    </div>

    <div class="carousel_modal_overlay" id="carousel_modal">
        <div class="carousel_modal">
            <div class="modal-header">
                <h3 class="modal-title">Nature Gallery</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="carousel-container">
                <div class="swiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Mountain Landscape">
                        </div>
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1518495973542-4542c06a5843" alt="Desert Scene">
                        </div>
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1" alt="Beach View">
                        </div>
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5" alt="Forest Path">
                        </div>
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1552083375-1447ce616485" alt="Colorful Flowers">
                        </div>
                        <div class="swiper-slide">
                            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Lakeside View">
                        </div>
                    </div>
                    <div class="swiper-pagination"></div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elements
            const openModalBtn = document.getElementById('openModal');
            const closeModalBtn = document.getElementById('closeModal');
            const carouselModal = document.getElementById('carousel_modal');
            
            // Initialize Swiper
            const swiper = new Swiper('.swiper', {
                direction: 'horizontal',
                loop: true,
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                },
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
                keyboard: {
                    enabled: true,
                },
                autoplay: {
                    delay: 5000,
                },
                effect: 'slide',
                speed: 500,
            });
            
            // Open modal
            openModalBtn.addEventListener('click', () => {
                carouselModal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Prevent scrolling
                swiper.slideTo(0); // Reset to first slide
            });
            
            // Close modal
            closeModalBtn.addEventListener('click', closeModal);
            carouselModal.addEventListener('click', (e) => {
                if (e.target === carouselModal) closeModal();
            });
            
            function closeModal() {
                carouselModal.classList.remove('active');
                document.body.style.overflow = ''; // Re-enable scrolling
            }
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (!carouselModal.classList.contains('active')) return;
                
                if (e.key === 'ArrowLeft') swiper.slidePrev();
                if (e.key === 'ArrowRight') swiper.slideNext();
                if (e.key === 'Escape') closeModal();
            });
        });
    </script>
</body>
</html>
