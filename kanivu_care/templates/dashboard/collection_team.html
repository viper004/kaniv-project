<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Document</title>
</head>

<style>
    :root {
            --primary: #7c4dff; --primary-light: #b47cff;
            --secondary: #00e5ff; --secondary-light: #6effff;
            --accent: #ff4081; --accent-light: #ff79b0;
            --dark: #263238; --light: #f5f7fa;
            --card-bg: #ffffff; --body-bg: #f0f2f5;
            --success: #00c853; --warning: #ffab00;
            --shadow: 0 15px 35px rgba(0,0,0,0.1); --radius: 16px;
        }
        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--body-bg); color: var(--dark);
            line-height: 1.7; min-height: 100vh;
            padding: 2rem 4rem;
            height: 100vh auto;
        }
        aside #create_notify {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 100;
    }

    .bell-wrap{
        position: absolute;
        top: 30px;
        right: 30px;
        background: grey;
        border-radius: 50%;
        padding: 5px 10px;
    }

    .bell-wrap.active::after{
        content: "";
        background: red;
        top: 20px;
        right: 20px;
        border-radius: 50%;
        padding: 5px;
    }
    
    aside #create_notify,strong {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.5rem;
        background: linear-gradient(135deg, #7c4dff, #b47cff);
        color: white;
        font-weight: 600;
        border-radius: 50px;
        box-shadow: 0 10px 25px rgba(124, 77, 255, 0.3);
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 1rem;
        border: none;
        cursor: pointer;
    }
    
    aside #create_notify:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(124, 77, 255, 0.4);
        background: linear-gradient(135deg, #b47cff, #7c4dff);
    }
    
    aside #create_notify:active {
        transform: translateY(1px);
    }
    
    /* Optional: Add a plus icon */
    aside #create_notify::before {
        content: '+';
        margin-right: 8px;
        font-size: 1.2rem;
    }

    aside #pending_lists{
        position: absolute;
        background: linear-gradient(135deg, #61E786, #EDCCEC);
        top:10%;
        right: 2%;
    }
    
    .container {
            max-width: 1600px; margin: 0 auto;
        }
        
        header {
            text-align: center; margin-bottom: 3rem;
            position: relative;
        }
        
        h1 {
            font-size: 2.8rem; font-weight: 700;
            color: var(--primary); margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .subtitle {
            font-size: 1.2rem; color: #607d8b;
            max-width: 700px; margin: 0 auto 2rem;
        }
</style>
<body>
    <a href="{% url 'dashboard:collection_team_notification' %}" class="bell-wrap active">
        <i class="fas fa-bell" style="color: white;"></i>
    </a>
     <header>
        <h1>Collection Team</h1>
        <p class="subtitle">Weekly update including fund collection details and upcoming event information.</p>
    </header>
    {% if request.user.userprofile.role == "convenier" or request.user.userprofile.role == "coordinator" %}
        <aside>
            <a href="" type="button" id="create_notify" onclick="openModal()">Create Notification</a>
        </aside>
    {% endif %}
</body>
</html>
